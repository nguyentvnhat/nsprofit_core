        - constraint_applied_3
        - next_step_1
        - next_step_2
        - current_discount_pct
        - recommended_discount_pct
        - discount_delta_pct
        - estimated_margin_recovery_per_order
        - estimated_total_margin_recovery
        - avg_orders_during_test

    action_template: |
      Recommendation:
      Reduce discount from {{current_discount_pct}}% to {{recommended_discount_pct}}% for {{recommended_duration_days}} days.

      Quick view:
      - Discount change: {{current_discount_pct}}% → {{recommended_discount_pct}}%
      - Estimated margin impact: +${{estimated_margin_recovery_per_order}} per order
      - Estimated total margin recovery: ~${{estimated_total_margin_recovery}}
      - Revenue recovery midpoint: ${{revenue_recovery_mid}}

      Why this works:
      - Current discount is {{current_discount_pct}}% and recommended discount is {{recommended_discount_pct}}% ({{discount_delta_pct}} pts lower)
      - This can recover about ${{estimated_margin_recovery_per_order}} per order
      - At expected test volume, that is about ${{estimated_total_margin_recovery}} over {{recommended_duration_days}} days
      - {{slow_mover_ratio_pct}}% of active SKUs are slow-moving ({{slow_mover_sku_count_30d}} of {{active_sku_count_30d}} SKUs)
      - Current profit basis: {{profit_basis_label}}

      Expected outcome:
      - {{recommended_sales_uplift_pct}} sales uplift on targeted SKUs
      - +${{estimated_margin_recovery_per_order}} per order
      - ~${{estimated_total_margin_recovery}} total over {{recommended_duration_days}} days
      - Revenue midpoint: ${{revenue_recovery_mid}} (range ${{revenue_recovery_low}}–${{revenue_recovery_high}})

      Risk:
      - {{risk_level}}: {{risk_reason}}

      Confidence:
      - {{confidence_level}}: {{confidence_reason}}

      Constraints applied:
      - {{constraint_applied_1}}
      - {{constraint_applied_2}}

      Next steps:
      - Reduce discount from {{current_discount_pct}}% to {{recommended_discount_pct}}%
      - Run for {{recommended_duration_days}} days
      - Target {{recommended_target_segment_label}}
      - Monitor revenue recovered, sell-through, and profit per order