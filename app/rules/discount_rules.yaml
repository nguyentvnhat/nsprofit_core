rules:
  - rule_code: slow_mover_discount_playbook
    enabled: true
    category: pricing
    severity: medium

    description: "A meaningful portion of active SKUs has not sold recently, indicating slow movers. Recommend a targeted discount test sized by margin safety, signal strength, and current profit-model completeness rather than a fixed promo."

    condition:
      all:
        - type: signal
          signal_code: SKU_SLOW_MOVERS_HIGH

    principles:
      - "Keep recommendations targeted to slow-moving SKUs rather than defaulting to store-wide discounting."
      - "Size recommendation strength by both demand signal and profit-model completeness."
      - "Do not overclaim profit safety when core cost inputs are missing."
      - "Prefer narrower scope and shorter duration when cost visibility is incomplete."
      - "Use clearer recovery plays for aged slow movers and safer plays for margin-constrained stores."

    constraints:
      preserve_backward_compatibility: true
      downgrade_confidence_if_cost_model_incomplete: true
      block_margin_safe_language_if_product_cost_missing: true
      prefer_narrow_targeting_if_fees_missing: true
      prefer_short_duration_if_profit_model_incomplete: true
      prefer_value_add_over_deep_discount_if_margin_visibility_weak: true
      cap_discount_if_product_cost_missing_pct: 10
      cap_discount_if_transaction_fees_missing_pct: 12
      force_duration_max_days_if_revenue_only: 5

    profit_model:
      completeness: "{{profit_model_completeness}}"
      basis_label: "{{profit_basis_label}}"
      confidence: "{{profit_basis_confidence}}"
      included_components:
        - "{{included_component_1}}"
        - "{{included_component_2}}"
        - "{{included_component_3}}"
        - "{{included_component_4}}"
      missing_components:
        - "{{missing_component_1}}"
        - "{{missing_component_2}}"
        - "{{missing_component_3}}"
        - "{{missing_component_4}}"
      flags:
        include_product_cost: "{{include_product_cost}}"
        include_shipping_cost: "{{include_shipping_cost}}"
        include_transaction_fees: "{{include_transaction_fees}}"
        include_custom_costs: "{{include_custom_costs}}"
      modes:
        product_cost_mode: "{{product_cost_mode}}"
        shipping_cost_mode: "{{shipping_cost_mode}}"
        transaction_fee_mode: "{{transaction_fee_mode}}"
        custom_cost_mode: "{{custom_cost_mode}}"

    title_template: "Run a targeted recovery play on slow-moving SKUs"
    summary_template: "A noticeable share of your active catalog is not converting, creating inventory drag and lost demand."
    implication_template: "Use a targeted promotion sized to margin safety, signal strength, and current cost visibility instead of applying a broad store-wide discount."

    quantified_signals:
      slow_mover_ratio_pct: "{{slow_mover_ratio_pct}}"
      affected_sku_count: "{{slow_mover_sku_count_30d}}"
      active_sku_count_30d: "{{active_sku_count_30d}}"
      inventory_value_stuck_usd: "{{slow_mover_net_revenue_30d_usd}}"
      revenue_exposed_usd: "{{slow_mover_net_revenue_30d_usd}}"
      avg_days_since_last_sale: "{{avg_days_since_last_sale_active_30d}}"
      priority_score: "{{priority_score_0_100}}"
      signal_strength: "{{signal_strength_label}}"
      margin_safety_band: "{{margin_safety_band}}"
      slow_mover_age_bucket: "{{slow_mover_age_bucket}}"
      historical_discounted_order_ratio_pct: "{{historical_discounted_order_ratio_pct}}"
      historical_blended_discount_rate_pct: "{{historical_blended_discount_rate_pct}}"
      compare_at_price_coverage_pct: "{{compare_at_price_coverage_pct}}"

      current_discount_pct: "{{current_discount_pct}}"
      recommended_discount_pct: "{{recommended_discount_pct}}"
      discount_delta_pct: "{{discount_delta_pct}}"
      estimated_margin_recovery_per_order: "{{estimated_margin_recovery_per_order}}"
      estimated_total_margin_recovery: "{{estimated_total_margin_recovery}}"
      avg_orders_during_test: "{{avg_orders_during_test}}"

    insight:
      title: "{{slow_mover_ratio_pct}}% of active SKUs are slow-moving ({{slow_mover_sku_count_30d}} of {{active_sku_count_30d}} SKUs)"
      summary: "About ${{slow_mover_net_revenue_30d_usd}} in 30-day net revenue is tied to slow-moving SKUs, with an average of {{avg_days_since_last_sale_active_30d}} days since last sale."
      implication: "This is a targeted catalog efficiency issue. A narrow promo on selected SKUs is safer than discounting the full store."
      context: "Current profit basis: {{profit_basis_label}}. Historical store discount baseline: {{historical_discounted_order_ratio_pct}}% of orders at {{historical_blended_discount_rate_pct}}% blended depth."

    decision:
      action_headline: "Reduce discount from {{current_discount_pct}}% to {{recommended_discount_pct}}% for {{recommended_duration_days}} days"
      action_compact: "{{current_discount_pct}}% → {{recommended_discount_pct}}% · {{recommended_duration_days}}d · +${{estimated_margin_recovery_per_order}}/order · ~${{estimated_total_margin_recovery}} total"
      recommended_action: "targeted_discount_test"
      discount_range: "{{recommended_discount_range}}"
      campaign_type: "{{recommended_campaign_type}}"
      target_segment: "{{recommended_target_segment}}"
      duration_days: "{{recommended_duration_days}}"
      execution_urgency: "{{execution_urgency}}"
      priority_score: "{{priority_score_0_100}}"
      primary_goal: "Recover demand from slow-moving inventory without weakening full-store price integrity"
      decision_mode: "{{decision_mode}}"
      recommended_action_headline: "{{recommended_action_headline}}"
      max_safe_discount_pct: "{{max_safe_discount_pct}}"
      confidence_adjustment_reason: "{{confidence_adjustment_reason}}"

    expected_impact:
      sales_uplift:
        point_estimate_pct: "{{recommended_sales_uplift_pct}}"
        range_pct: "{{recommended_sales_uplift_range_pct}}"

      revenue_recovery:
        point_estimate_usd: "{{revenue_recovery_mid}}"
        range_usd: "${{revenue_recovery_low}}–${{revenue_recovery_high}}"
        timeframe: "{{recommended_duration_days}} days"

      inventory_reduction:
        point_estimate_pct: "{{recommended_inventory_reduction_pct}}"
        range_pct: "{{recommended_inventory_reduction_range_pct}}"

      profit_impact:
        label: "{{recommended_profit_impact_label}}"
        summary: "{{recommended_profit_impact_summary}}"

      basis_note: "{{profit_basis_note}}"
      margin_recovery_per_order_usd: "{{estimated_margin_recovery_per_order}}"
      total_margin_recovery_usd: "{{estimated_total_margin_recovery}}"

    risk:
      level: "{{risk_level}}"
      reason: "{{risk_reason}}"

    confidence:
      level: "{{confidence_level}}"
      reason: "{{confidence_reason}}"

    decision_summary:
      headline: "{{current_discount_pct}}% → {{recommended_discount_pct}}% for {{recommended_duration_days}} days"
      impact_headline: "+${{estimated_margin_recovery_per_order}} per order · ~${{estimated_total_margin_recovery}} total"
      money_headline: "~${{revenue_recovery_mid}} revenue midpoint · ~${{estimated_total_margin_recovery}} margin recovery"
      expected:
        - "Estimated margin recovery: +${{estimated_margin_recovery_per_order}} per order"
        - "Estimated total margin recovery: ~${{estimated_total_margin_recovery}} over {{recommended_duration_days}} days"
        - "Revenue recovery midpoint: ${{revenue_recovery_mid}} (range: ${{revenue_recovery_low}}–${{revenue_recovery_high}})"
        - "Expected sales uplift on targeted SKUs: {{recommended_sales_uplift_pct}} (range: {{recommended_sales_uplift_range_pct}})"
      why:
        - "Current discount is {{current_discount_pct}}% while recommended discount is {{recommended_discount_pct}}% ({{discount_delta_pct}} pts lower)"
        - "That change can recover about ${{estimated_margin_recovery_per_order}} per order"
        - "At expected test volume (~{{avg_orders_during_test}} orders), that is about ${{estimated_total_margin_recovery}} over {{recommended_duration_days}} days"
        - "{{slow_mover_ratio_pct}}% of active SKUs are slow-moving ({{slow_mover_sku_count_30d}} of {{active_sku_count_30d}} SKUs)"
        - "Current profit basis is {{profit_basis_label}}"
      risk:
        - "{{risk_level}} risk: {{risk_reason}}"
      next_steps:
        - "Reduce discount from {{current_discount_pct}}% to {{recommended_discount_pct}}%"
        - "Run the test for {{recommended_duration_days}} days on slow-moving SKUs only"
        - "Target {{recommended_target_segment_label}} first"
        - "Track profit per order, conversion rate, and sell-through by targeted SKU"
        - "Stop, tighten, or extend the promo based on margin and demand response"
        - "{{next_step_1}}"
        - "{{next_step_2}}"

    constraints_applied:
      - "{{constraint_applied_1}}"
      - "{{constraint_applied_2}}"
      - "{{constraint_applied_3}}"

    ui_payload:
      recommendation_action: "Reduce discount from {{current_discount_pct}}% to {{recommended_discount_pct}}% for {{recommended_duration_days}} days"
      recommendation_compact: "{{current_discount_pct}}% → {{recommended_discount_pct}}% · +${{estimated_margin_recovery_per_order}}/order · ~${{estimated_total_margin_recovery}} total"

      primary_numbers:
        action_percent_change: "{{current_discount_pct}}% → {{recommended_discount_pct}}%"
        duration: "{{recommended_duration_days}} days"
        per_order_profit_impact: "+${{estimated_margin_recovery_per_order}} per order"
        total_profit_impact: "~${{estimated_total_margin_recovery}} total"
        revenue_midpoint: "${{revenue_recovery_mid}} revenue midpoint"

      expected_impact:
        headline: "{{current_discount_pct}}% → {{recommended_discount_pct}}% · +${{estimated_margin_recovery_per_order}}/order"
        total_margin_recovery: "~${{estimated_total_margin_recovery}} over {{recommended_duration_days}} days"
        revenue_recovery: "${{revenue_recovery_mid}} midpoint revenue recovery"
        sales_uplift: "{{recommended_sales_uplift_pct}} expected uplift on targeted SKUs"
        inventory_reduction: "{{recommended_inventory_reduction_pct}} expected reduction in slow-moving inventory"
        risk_level: "{{risk_level}}"
        confidence_level: "{{confidence_level}}"

      why_this_works:
        - "Current discount is {{current_discount_pct}}% vs recommended {{recommended_discount_pct}}% ({{discount_delta_pct}} pts lower)"
        - "This unlocks about ${{estimated_margin_recovery_per_order}} additional margin per order"
        - "At expected test volume, that is about ${{estimated_total_margin_recovery}} over {{recommended_duration_days}} days"
        - "The test is limited to slow-moving SKUs, so top sellers keep their current pricing"
        - "Profit basis: {{profit_basis_label}}"

      what_to_do_next:
        - "Reduce discount from {{current_discount_pct}}% to {{recommended_discount_pct}}%"
        - "Run the test for {{recommended_duration_days}} days"
        - "Target {{recommended_target_segment_label}} first"
        - "Aim for about +${{estimated_margin_recovery_per_order}} margin per order"
        - "Monitor conversion, profit per order, and sell-through"
        - "Revert or narrow the promo if conversion drops too far"

      supporting_metrics:
        - "{{slow_mover_ratio_pct}}% slow-moving SKUs"
        - "{{slow_mover_sku_count_30d}} of {{active_sku_count_30d}} active SKUs affected"
        - "${{slow_mover_net_revenue_30d_usd}} 30-day net revenue tied to slow movers"
        - "{{avg_days_since_last_sale_active_30d}} average days since last sale"
        - "Current discount: {{current_discount_pct}}%"
        - "Recommended discount: {{recommended_discount_pct}}%"
        - "Margin recovery: +${{estimated_margin_recovery_per_order}}/order"
        - "Estimated total recovery: ~${{estimated_total_margin_recovery}}"
        - "Revenue midpoint: ${{revenue_recovery_mid}}"
        - "Priority score: {{priority_score_0_100}}/100"

      call_to_action: "Create Discount Campaign"
      recommended_products: "Top slow-moving SKUs"

    preview_discount_logic:
      discount_range: "{{recommended_discount_range}}"
      current_discount_pct: "{{current_discount_pct}}"
      recommended_discount_pct: "{{recommended_discount_pct}}"
      discount_delta_pct: "{{discount_delta_pct}}"
      campaign_type: "{{recommended_campaign_type}}"
      target_segment: "{{recommended_target_segment}}"
      duration_days: "{{recommended_duration_days}}"
      risk_level: "{{risk_level}}"
      confidence_level: "{{confidence_level}}"
      decision_mode: "{{decision_mode}}"
      max_safe_discount_pct: "{{max_safe_discount_pct}}"
      profit_model_completeness: "{{profit_model_completeness}}"

    profit_basis:
      label: "{{profit_basis_label}}"
      confidence: "{{profit_basis_confidence}}"
      included_components:
        - "{{included_component_1}}"
        - "{{included_component_2}}"
        - "{{included_component_3}}"
        - "{{included_component_4}}"
      missing_components:
        - "{{missing_component_1}}"
        - "{{missing_component_2}}"
        - "{{missing_component_3}}"
        - "{{missing_component_4}}"

    disclaimers:
      - "{{disclaimer_1}}"
      - "{{disclaimer_2}}"

    action_prompt:
      required_inputs:
        - slow_mover_ratio_pct
        - slow_mover_sku_count_30d
        - active_sku_count_30d
        - slow_mover_net_revenue_30d_usd
        - avg_days_since_last_sale_active_30d
        - priority_score_0_100
        - margin_safety_band
        - signal_strength_label
        - recommended_discount_range
        - recommended_duration_days
        - recommended_sales_uplift_pct
        - recommended_sales_uplift_range_pct
        - recommended_inventory_reduction_pct
        - recommended_inventory_reduction_range_pct
        - revenue_recovery_low
        - revenue_recovery_mid
        - revenue_recovery_high
        - recommended_profit_impact_label
        - recommended_profit_impact_summary
        - risk_level
        - risk_reason
        - confidence_level
        - confidence_reason
        - recommended_target_segment
        - recommended_target_segment_label
        - recommended_campaign_type
        - execution_urgency
        - slow_mover_age_bucket
        - historical_discounted_order_ratio_pct
        - historical_blended_discount_rate_pct
        - compare_at_price_coverage_pct
        - profit_model_completeness
        - profit_basis_label
        - profit_basis_confidence
        - include_product_cost
        - include_shipping_cost
        - include_transaction_fees
        - include_custom_costs
        - product_cost_mode
        - shipping_cost_mode
        - transaction_fee_mode
        - custom_cost_mode
        - decision_mode
        - recommended_action_headline
        - max_safe_discount_pct
        - confidence_adjustment_reason
        - profit_basis_note
        - included_component_1
