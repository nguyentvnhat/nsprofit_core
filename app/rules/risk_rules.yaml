rules:
  - rule_code: risk_refund_rate_elevated
    category: risk
    severity: high
    enabled: true
    condition:
      all:
        - type: signal
          signal_code: ELEVATED_REFUND_RATE
        - type: metric
          metric: total_orders
          operator: ">"
          value: 0
    title_template: "Refund rate is elevated"
    summary_template: "Refund exposure is above threshold and can erode realized revenue."
    implication_template: "Operational quality or expectation mismatch may be impacting margin."
    action_template: "Analyze refund reasons by SKU/source and tighten product QA and PDP clarity."

  - rule_code: risk_free_shipping_overuse
    category: operational_risk
    severity: medium
    enabled: true
    condition:
      any:
        - type: signal
          signal_code: FREE_SHIPPING_HEAVY
        - type: metric
          metric: free_shipping_rate
          operator: ">"
          value: 0.65
    title_template: "Free shipping usage is high"
    summary_template: "Free shipping rate is {free_shipping_rate:.2f}, reducing contribution margin."
    implication_template: "Shipping policy may be too permissive for current basket economics."
    action_template: "Introduce threshold shipping and test geo/product-specific shipping policies."
